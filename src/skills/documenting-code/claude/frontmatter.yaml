user-invocable: true
context: fork
allowed-tools:
  - Task
  - TaskCreate
  - TaskUpdate
  - TaskList
  - AskUserQuestion
  - Read
  - Edit
  - Write
  - Bash(git diff *)
  - Bash(git status *)
  - Bash(markdownlint-cli2 *)
  - Bash(make lint-markdown)
  - Bash(make validate)
  - Bash(make check)
  - Bash(ctx7 *)
  - Bash(npx ctx7@latest *)
  - Bash(bunx ctx7@latest *)
