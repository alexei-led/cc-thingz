name: Release
on:
  push:
    tags:
      - v*.*.*
permissions:
  contents: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
      - run: uv sync --all-groups --extra test
      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install Agent Bundler
        run: go install github.com/alexei-led/agentbundler/cmd/agbun@latest
      - run: make ci
  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
      - run: uv sync --all-groups --extra test
      - name: Install Agent Bundler
        run: go install github.com/alexei-led/agentbundler/cmd/agbun@latest
      - name: Build target-native distributions
        run: agbun build --root .
      - name: Package target-native distributions
        run: agbun package --root . --out "$RUNNER_TEMP/release-artifacts"
      - name: Generate release notes
        run: |
          uv run scripts/release/generate-release-notes.py \
            --tag "${{ github.ref_name }}" \
            --repository "${{ github.repository }}" \
            --changelog CHANGELOG.md \
            --packages-dir src/.agentbundler/packages \
            --output "$RUNNER_TEMP/release-notes.md"
      - uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ runner.temp }}/release-notes.md
          files: ${{ runner.temp }}/release-artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: false
